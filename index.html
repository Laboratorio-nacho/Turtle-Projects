<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Nacho — Python Animations</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap"
      rel="stylesheet"
    />
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      :root {
        --bg: #0a0a0f;
        --surface: #111118;
        --border: rgba(255, 255, 255, 0.08);
        --accent: #00ff88;
        --text: #e8e8f0;
        --muted: #666680;
        --mono: "Space Mono", monospace;
        --sans: "DM Sans", sans-serif;
      }
      body {
        background: var(--bg);
        color: var(--text);
        font-family: var(--sans);
        min-height: 100vh;
      }
      header {
        padding: 3rem 2rem 2rem;
        border-bottom: 1px solid var(--border);
        display: flex;
        align-items: flex-end;
        justify-content: space-between;
        flex-wrap: wrap;
        gap: 1rem;
      }
      .logo {
        font-family: var(--mono);
        font-size: 0.75rem;
        color: var(--accent);
        letter-spacing: 0.2em;
        text-transform: uppercase;
        margin-bottom: 0.5rem;
      }
      h1 {
        font-family: var(--mono);
        font-size: clamp(2rem, 5vw, 3.5rem);
        font-weight: 700;
        line-height: 1;
      }
      h1 span {
        color: var(--accent);
      }
      .subtitle {
        font-size: 0.9rem;
        color: var(--muted);
        font-family: var(--mono);
        align-self: flex-end;
      }
      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
        gap: 1px;
        background: var(--border);
        border-top: 1px solid var(--border);
      }
      .card {
        background: var(--surface);
        cursor: pointer;
        transition: background 0.2s;
      }
      .card:hover {
        background: #16161f;
      }
      .card-preview {
        width: 100%;
        aspect-ratio: 4/3;
        background: #0d0d14;
        display: flex;
        align-items: center;
        justify-content: center;
        border-bottom: 1px solid var(--border);
        position: relative;
        overflow: hidden;
      }
      .play-hint {
        position: absolute;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        background: rgba(0, 0, 0, 0.4);
        transition: opacity 0.2s;
      }
      .card:hover .play-hint {
        opacity: 0;
      }
      .play-btn {
        width: 48px;
        height: 48px;
        border-radius: 50%;
        border: 2px solid var(--accent);
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .play-btn svg {
        fill: var(--accent);
      }
      .card-info {
        padding: 1rem 1.25rem;
      }
      .tag {
        font-family: var(--mono);
        font-size: 0.65rem;
        letter-spacing: 0.15em;
        text-transform: uppercase;
        color: var(--accent);
        margin-bottom: 0.4rem;
      }
      .card-title {
        font-family: var(--mono);
        font-size: 1rem;
        font-weight: 700;
        margin-bottom: 0.35rem;
      }
      .card-desc {
        font-size: 0.8rem;
        color: var(--muted);
        line-height: 1.5;
      }
      .run-btn {
        margin-top: 0.75rem;
        display: inline-flex;
        align-items: center;
        gap: 6px;
        font-family: var(--mono);
        font-size: 0.7rem;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        color: var(--accent);
        border: 1px solid var(--accent);
        padding: 6px 14px;
        border-radius: 2px;
        background: transparent;
        cursor: pointer;
        transition:
          background 0.15s,
          color 0.15s;
      }
      .run-btn:hover {
        background: var(--accent);
        color: #000;
      }
      .modal-bg {
        display: none;
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.85);
        z-index: 100;
        align-items: center;
        justify-content: center;
      }
      .modal-bg.open {
        display: flex;
      }
      .modal {
        background: var(--surface);
        border: 1px solid var(--border);
        width: 90vw;
        max-width: 700px;
        max-height: 90vh;
        overflow-y: auto;
      }
      .modal-header {
        padding: 1.25rem 1.5rem;
        border-bottom: 1px solid var(--border);
        display: flex;
        justify-content: space-between;
        align-items: center;
      }
      .modal-title {
        font-family: var(--mono);
        font-size: 1rem;
      }
      .close-btn {
        background: none;
        border: none;
        color: var(--muted);
        font-size: 1.5rem;
        cursor: pointer;
        line-height: 1;
      }
      .close-btn:hover {
        color: var(--text);
      }
      .canvas-wrap {
        background: #000;
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 400px;
      }
      .modal-controls {
        padding: 1rem 1.5rem;
        display: flex;
        gap: 0.75rem;
        border-top: 1px solid var(--border);
        align-items: center;
        flex-wrap: wrap;
      }
      .stop-btn {
        color: #ff4466 !important;
        border-color: #ff4466 !important;
      }
      .stop-btn:hover {
        background: #ff4466 !important;
        color: #fff !important;
      }
      .err {
        font-family: var(--mono);
        font-size: 0.65rem;
        color: #ff4466;
        flex: 1;
      }
      footer {
        padding: 2rem;
        border-top: 1px solid var(--border);
        font-family: var(--mono);
        font-size: 0.7rem;
        color: var(--muted);
        display: flex;
        gap: 2rem;
        flex-wrap: wrap;
      }
      footer a {
        color: var(--accent);
        text-decoration: none;
      }
    </style>
  </head>
  <body>
    <header>
      <div>
        <div class="logo">nachoportafolio.me</div>
        <h1>python<span>.</span>animations</h1>
      </div>
      <div class="subtitle">// turtle projects</div>
    </header>

    <div class="grid" id="grid"></div>

    <div class="modal-bg" id="modal">
      <div class="modal">
        <div class="modal-header">
          <span class="modal-title" id="modal-title"></span>
          <button class="close-btn" id="modal-close">&times;</button>
        </div>
        <div class="canvas-wrap" id="canvas-wrap">
          <canvas
            id="tcanvas"
            width="480"
            height="380"
            style="display: block"
          ></canvas>
        </div>
        <div class="modal-controls">
          <button class="run-btn" id="btn-run">&#9654; ejecutar</button>
          <button class="run-btn stop-btn" id="btn-stop">
            &#9632; reiniciar
          </button>
          <span class="err" id="err"></span>
        </div>
      </div>
    </div>

    <footer>
      <span>built with skulpt + turtle</span>
      <a href="https://nachoportafolio.me">&#8592; volver al portafolio</a>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/skulpt@1.2.0/dist/skulpt.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/skulpt@1.2.0/dist/skulpt-stdlib.js"></script>
    <script>
      var projects = [
        {
          file: "virus.py",
          tag: "generative",
          desc: "Espiral caótica verde sobre fondo negro.",
        },
        {
          file: "genial.py",
          tag: "pattern",
          desc: "Espiral cuadrada con colores cíclicos.",
        },
        {
          file: "optico.py",
          tag: "optical art",
          desc: "Ilusión óptica con colores HSV.",
        },
        {
          file: "infinito.py",
          tag: "geometric",
          desc: "Curva infinito con círculos en cian.",
        },
        {
          file: "corazon.py",
          tag: "shape",
          desc: "Corazón rojo con arcos y líneas.",
        },
        {
          file: "cuadrito.py",
          tag: "loop",
          desc: "Espiral cuadrada que crece.",
        },
        {
          file: "love.py",
          tag: "art",
          desc: "Corazón rojo con texto estilizado.",
        },
        {
          file: "amongus.py",
          tag: "character",
          desc: "Personaje Among Us con visor azul.",
        },
      ];

      var cache = {};
      var current = null;

      function loadPy(file, cb, errcb) {
        if (cache[file]) {
          cb(cache[file]);
          return;
        }
        var xhr = new XMLHttpRequest();
        xhr.open("GET", file);
        xhr.onload = function () {
          if (xhr.status === 200) {
            cache[file] = xhr.responseText;
            cb(xhr.responseText);
          } else {
            errcb("HTTP " + xhr.status);
          }
        };
        xhr.onerror = function () {
          errcb("No se pudo cargar " + file);
        };
        xhr.send();
      }

      function resetCanvas() {
        var wrap = document.getElementById("canvas-wrap");
        wrap.innerHTML = "";
        var c = document.createElement("canvas");
        c.id = "tcanvas";
        c.width = 480;
        c.height = 380;
        c.style.display = "block";
        wrap.appendChild(c);
        return c;
      }

      function execCode(code) {
        document.getElementById("err").textContent = "";
        var canvas = resetCanvas();

        Sk.configure({
          output: function () {},
          read: function (x) {
            if (
              Sk.builtinFiles === undefined ||
              Sk.builtinFiles.files[x] === undefined
            )
              throw "File not found: '" + x + "'";
            return Sk.builtinFiles.files[x];
          },
          __future__: Sk.python3,
          killableWhile: true,
          killableFor: true,
        });

        Sk.TurtleGraphics = {
          target: canvas,
          width: 480,
          height: 380,
          animate: true,
        };

        Sk.misceval
          .asyncToPromise(function () {
            return Sk.importMainWithBody("<stdin>", false, code, true);
          })
          .then(function () {
            document.getElementById("err").textContent = "";
          })
          .catch(function (e) {
            var msg = e.toString();
            // ignorar exitonclick / exitonclick no es un error real
            if (
              msg.indexOf("exitonclick") === -1 &&
              msg.indexOf("done") === -1
            ) {
              document.getElementById("err").textContent = msg.substring(
                0,
                120,
              );
            }
          });
      }

      // build grid
      var grid = document.getElementById("grid");
      projects.forEach(function (p) {
        var card = document.createElement("div");
        card.className = "card";
        card.innerHTML =
          '<div class="card-preview"><div class="play-hint"><div class="play-btn">' +
          '<svg width="16" height="16" viewBox="0 0 16 16"><polygon points="4,2 14,8 4,14"/></svg>' +
          "</div></div></div>" +
          '<div class="card-info">' +
          '<div class="tag">' +
          p.tag +
          "</div>" +
          '<div class="card-title">' +
          p.file +
          "</div>" +
          '<div class="card-desc">' +
          p.desc +
          "</div>" +
          '<button class="run-btn">&#9654; ejecutar</button>' +
          "</div>";
        grid.appendChild(card);
        function open() {
          openModal(p);
        }
        card.addEventListener("click", open);
        card.querySelector(".run-btn").addEventListener("click", function (e) {
          e.stopPropagation();
          open();
        });
      });

      var modal = document.getElementById("modal");

      function openModal(p) {
        current = p;
        document.getElementById("modal-title").textContent = p.file;
        document.getElementById("err").textContent = "";
        modal.classList.add("open");
        resetCanvas();
      }

      document
        .getElementById("modal-close")
        .addEventListener("click", function () {
          modal.classList.remove("open");
        });
      modal.addEventListener("click", function (e) {
        if (e.target === modal) modal.classList.remove("open");
      });

      document.getElementById("btn-run").addEventListener("click", function () {
        if (!current) return;
        var btn = document.getElementById("btn-run");
        btn.textContent = "cargando...";
        btn.disabled = true;
        loadPy(
          current.file,
          function (code) {
            btn.innerHTML = "&#9654; ejecutar";
            btn.disabled = false;
            execCode(code);
          },
          function (err) {
            btn.innerHTML = "&#9654; ejecutar";
            btn.disabled = false;
            document.getElementById("err").textContent = "Error: " + err;
          },
        );
      });

      document
        .getElementById("btn-stop")
        .addEventListener("click", function () {
          location.reload();
        });
    </script>
  </body>
</html>
